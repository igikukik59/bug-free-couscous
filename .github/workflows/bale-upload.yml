name: 🚀 Bale Upload & Speed Test (10 MB)

on:
  workflow_dispatch:

permissions:
  contents: write      # اجازه push به ریپو

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout repository (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎬 Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 📦 Install Python dependencies
        run: pip install aiobale Pillow

      - name: 🎥 Generate ~10 MB random video (10 sec, 8000kbps)
        run: |
          ffmpeg -y -f lavfi -i "testsrc2=size=640x360:rate=24:duration=10" \
                 -f lavfi -i "sine=frequency=800:duration=10" \
                 -c:v libx264 -b:v 8000k -maxrate 8000k -bufsize 8000k \
                 -c:a aac -b:a 128k \
                 -shortest test_video.mp4
          ls -lh test_video.mp4

      - name: 🔐 Restore session file from base64
        env:
          SESSION_B64: ""
        run: echo "$SESSION_B64" | base64 -d > bale_uploader.bale

      - name: 📤 Upload video and save log
        id: upload
        run: |
          python - <<'PYEOF' 2>&1 | tee لاگلاگلاگ
          import asyncio, time, os, sys
          from io import BytesIO
          from PIL import Image
          from aiobale import Client, Dispatcher
          from aiobale.types import FileInput
          from aiobale.enums import ChatType

          if sys.platform == 'win32':
              asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())

          def make_thumbnail():
              img = Image.new('RGB', (50, 50), color=(100, 100, 100))
              buf = BytesIO()
              img.save(buf, format='JPEG')
              return buf.getvalue(), 50, 50

          async def main():
              dp = Dispatcher()
              client = Client(dp, session_file="bale_uploader.bale")
              print("📍 Connecting to Bale...")
              await client.start(run_in_background=True)
              print("✅ Connected")
              me = await client.get_me()
              print(f"👤 User ID: {me.id}")

              path = "test_video.mp4"
              size = os.path.getsize(path)
              print(f"📦 {path} – {size/1024/1024:.2f} MB")

              thumb, tw, th = make_thumbnail()
              print("⏳ Uploading video...")
              start = time.monotonic()
              msg = await client.send_video(
                  FileInput(path),
                  me.id,
                  ChatType.PRIVATE,
                  caption="GitHub Actions - 10MB test",
                  cover_thumb=FileInput(thumb),
                  cover_width=tw,
                  cover_height=th
              )
              elapsed = time.monotonic() - start
              speed = (size * 8) / (elapsed * 1024 * 1024)
              print(f"✅ Upload successful in {elapsed:.2f}s – {speed:.2f} Mbps")
              print(f"   Message ID: {msg.message_id}")
              await client.stop()

          asyncio.run(main())
          PYEOF

      - name: 📌 Commit and push log file
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add لاگلاگلاگ
          git commit -m "📋 Add upload log" || echo "Nothing to commit"
          git push
