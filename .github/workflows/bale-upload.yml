name: 🔍 Quick Session Test (Rubika)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quick-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install rubpy
        run: pip install rubpy

      - name: 🔌 Test connection & small upload
        run: |
          python - <<'PYEOF'
          import asyncio, time, os, subprocess
          from rubpy import Client

          async def main():
              app = Client(name="rubika_vps_session", platform="Android")
              print("📍 Connecting...")
              await app.start()
              print("✅ Connected")
              me = await app.get_me()
              user = getattr(me, "user", None)
              if user:
                  print(f"👤 {getattr(user, 'first_name', '?')}  |  GUID: {getattr(user, 'user_guid', '?')}")
              else:
                  print("⚠️ Could not fetch user info")
              await app.disconnect()
              print("🎉 Session works on GitHub Actions!")

          asyncio.run(main())
          PYEOF
